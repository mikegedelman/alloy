[lib]
crate-type = [ "staticlib" ] # to generate a `lib<package_name>.a`
                             # i.e. an archive of `.o` files

[package]
name = "ros"
version = "0.1.0"
edition = "2018"

[dependencies]
spin = "0.7.1"
bitflags = { version = "1.2.1", optional = true }

[dependencies.lazy_static]
version = "1.0"
features = ["spin_no_std"]

[profile.dev]
# panic = "abort"
overflow-checks = false

[profile.release]
panic = "abort"
overflow-checks = false

[features]
verbose = []
test = ["bitflags"]
